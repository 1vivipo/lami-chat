name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: 7rlnN8DnBXZ57TftXkOibKDy8mQRZLvrmW13-8BF
          
      - run: npm install
      
      - name: Build APK with expect
        run: |
          # Install expect for interactive prompts
          sudo apt-get install -y expect
          
          # Create expect script
          cat > build.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 600
          spawn eas build --platform android --profile preview --local --output ./app.apk
          expect {
            "Would you like to automatically create an EAS project" {
              send "y\r"
              exp_continue
            }
            "Would you like to automatically create" {
              send "y\r"
              exp_continue
            }
            "Generate a new Android Keystore" {
              send "y\r"
              exp_continue
            }
            eof
          }
          EOF
          
          chmod +x build.exp
          ./build.exp
        env:
          EXPO_TOKEN: 7rlnN8DnBXZ57TftXkOibKDy8mQRZLvrmW13-8BF
          
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: ./app.apk
          
      - uses: softprops/action-gh-release@v1
        with:
          files: ./app.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
