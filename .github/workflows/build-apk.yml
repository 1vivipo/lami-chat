name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --yes
        env:
          EXPO_NO_DOTENV: 1

      - name: Build Debug APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk lami-chat.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lami-chat-apk
          path: lami-chat.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 下载
            下载下方的 APK 文件安装即可
            
            ### 安装说明
            1. 下载 APK 文件
            2. 在手机上打开并允许安装未知来源应用
            3. 按照提示完成安装
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
