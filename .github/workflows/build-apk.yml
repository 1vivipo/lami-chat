name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm install
        
      - name: Remove EAS config
        run: |
          rm -f eas.json
          cat app.json | jq 'del(.expo.extra.eas)' > app.json.tmp && mv app.json.tmp app.json
          
      - name: Generate Android project
        run: |
          npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_DOTENV: 1
          EXPO_NO_INTERACTIVE: 1
          
      - name: List generated files
        run: |
          ls -la android/ || echo "No android folder"
          ls -la android/app/ || echo "No app folder"
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          
      - name: Find and copy APK
        run: |
          find . -name "*.apk" -type f
          cp android/app/build/outputs/apk/debug/*.apk ./lami-chat.apk
          ls -la ./lami-chat.apk
          
      - uses: actions/upload-artifact@v4
        with:
          name: lami-chat-apk
          path: ./lami-chat.apk
          retention-days: 90
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: ./lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
