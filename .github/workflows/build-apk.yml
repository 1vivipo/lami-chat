name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm install
        
      - name: Clean previous builds
        run: rm -rf android
        
      - name: Generate native project
        run: |
          # 直接调用 expo prebuild，不使用任何 EAS
          npx expo prebuild --platform android
        continue-on-error: true
        
      - name: Check if android folder exists
        run: |
          if [ -d "android" ]; then
            echo "Android folder created successfully"
            ls -la android/
          else
            echo "ERROR: Android folder not created!"
            exit 1
          fi
        
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        continue-on-error: true
        
      - name: Find all APK files
        run: |
          echo "=== Searching entire filesystem for APK ==="
          find / -name "*.apk" -type f 2>/dev/null || true
          
      - name: Check build outputs
        run: |
          echo "=== Checking android/app/build/outputs ==="
          ls -la android/app/build/outputs/ 2>/dev/null || echo "outputs dir not found"
          ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "apk dir not found"
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "debug dir not found"
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "release dir not found"
          
      - name: Upload APK if found
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lami-chat-build
          path: |
            android/app/build/outputs/apk/**/*.apk
            *.apk
          retention-days: 7
          if-no-files-found: warn
