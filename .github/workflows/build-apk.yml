name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm ci
        
      - name: Prebuild Android project
        run: npx expo prebuild --platform android
        
      - name: Patch Gradle files for compatibility
        run: |
          # 将 android/build.gradle 中的 AGP 版本改为 7.4.2
          sed -i "s/com.android.tools.build:gradle:.*/com.android.tools.build:gradle:7.4.2'/" android/build.gradle
          # 将 gradle-wrapper.properties 中的 Gradle 版本改为 8.0.2
          sed -i "s/gradle-.*-all.zip/gradle-8.0.2-all.zip/" android/gradle/wrapper/gradle-wrapper.properties
          echo "=== Patched AGP to 7.4.2 and Gradle to 8.0.2 ==="
          echo ""
          echo "=== build.gradle ==="
          cat android/build.gradle
          echo ""
          echo "=== gradle-wrapper.properties ==="
          cat android/gradle/wrapper/gradle-wrapper.properties
        
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace
          
      - name: Find APK
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f
          
      - name: Copy APK
        run: |
          APK=$(find android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" ./lami-chat.apk
            ls -la ./lami-chat.apk
          else
            echo "No APK found!"
            exit 1
          fi
          
      - uses: actions/upload-artifact@v4
        with:
          name: lami-chat-apk
          path: ./lami-chat.apk
          retention-days: 90
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: ./lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
