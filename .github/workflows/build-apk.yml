name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm ci
        
      - name: Prebuild Android project
        run: npx expo prebuild --platform android
        
      - name: Build APK with Gradle
        id: build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
          echo "build_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true
        
      - name: Extract error from log
        if: steps.build.outputs.build_exit_code != '0'
        id: extract_error
        run: |
          cd android
          
          # 提取错误信息
          echo "=== 提取错误信息 ===" > error_summary.txt
          echo "" >> error_summary.txt
          
          # 查找 FAILURE 关键字
          echo "【FAILURE 部分】" >> error_summary.txt
          grep -A 20 "FAILURE" build.log >> error_summary.txt 2>/dev/null || echo "未找到 FAILURE" >> error_summary.txt
          echo "" >> error_summary.txt
          
          # 查找 What went wrong
          echo "【What went wrong】" >> error_summary.txt
          grep -A 10 "What went wrong" build.log >> error_summary.txt 2>/dev/null || echo "未找到 What went wrong" >> error_summary.txt
          echo "" >> error_summary.txt
          
          # 查找 error 关键字
          echo "【Error 部分】" >> error_summary.txt
          grep -i "error" build.log | head -30 >> error_summary.txt 2>/dev/null || echo "未找到 error" >> error_summary.txt
          echo "" >> error_summary.txt
          
          # 查找 exception
          echo "【Exception 部分】" >> error_summary.txt
          grep -i "exception" build.log | head -20 >> error_summary.txt 2>/dev/null || echo "未找到 exception" >> error_summary.txt
          echo "" >> error_summary.txt
          
          # 查找 Caused by
          echo "【Caused by】" >> error_summary.txt
          grep -A 5 "Caused by" build.log >> error_summary.txt 2>/dev/null || echo "未找到 Caused by" >> error_summary.txt
          
          # 保存到环境变量
          {
            echo 'error_summary<<EOF'
            cat error_summary.txt
            echo EOF
          } >> $GITHUB_ENV
          
          # 显示错误摘要
          echo "========== 错误摘要 =========="
          cat error_summary.txt
          echo "=============================="
          
      - name: Upload error log
        if: steps.build.outputs.build_exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: |
            android/build.log
            android/error_summary.txt
          retention-days: 7
          
      - name: Create error issue
        if: steps.build.outputs.build_exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const errorSummary = process.env.error_summary || '构建失败，请查看日志';
            
            // 创建 Issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 构建失败 - ${new Date().toISOString().split('T')[0]}`,
              body: `## 构建失败报告
            
            **时间**: ${new Date().toISOString()}
            **运行链接**: ${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            
            ## 错误摘要
            
            \`\`\`
            ${errorSummary}
            \`\`\`
            
            ## 下一步
            
            请查看 [构建日志](${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) 获取详细信息。
            `,
              labels: ['build-error', 'automated']
            });
            
      - name: Find APK
        if: steps.build.outputs.build_exit_code == '0'
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f
          
      - name: Copy APK
        if: steps.build.outputs.build_exit_code == '0'
        run: |
          APK=$(find android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" ./lami-chat.apk
            ls -la ./lami-chat.apk
          else
            echo "No APK found!"
            exit 1
          fi
          
      - uses: actions/upload-artifact@v4
        if: steps.build.outputs.build_exit_code == '0'
        with:
          name: lami-chat-apk
          path: ./lami-chat.apk
          retention-days: 90
          
      - name: Create Release
        if: steps.build.outputs.build_exit_code == '0'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: ./lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # 最终状态检查
      - name: Check build status
        if: steps.build.outputs.build_exit_code != '0'
        run: |
          echo "❌ 构建失败！"
          echo "错误摘要已保存到 artifact 和 Issue"
          exit 1
