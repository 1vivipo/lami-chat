name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Clean previous builds
        run: |
          rm -rf node_modules
          rm -rf android
          rm -rf ios
          rm -f package-lock.json
          
      - name: Install dependencies
        run: npm install
        
      - name: Fix Expo dependencies
        run: npx expo install --fix
        
      - name: Generate Android project
        run: npx expo prebuild --platform android --clean
        
      - name: Fix Gradle config
        run: |
          cd android
          
          # 使用 Gradle 8.2
          sed -i 's|gradle-[0-9.]*-all.zip|gradle-8.2-all.zip|g' gradle/wrapper/gradle-wrapper.properties
          
          # 确保 settings.gradle 包含 Expo 仓库
          if ! grep -q "expo-module-gradle-plugin" settings.gradle 2>/dev/null; then
            echo "Adding expo-module-gradle-plugin to settings.gradle"
            cat >> settings.gradle << 'EOF'

          // Expo modules
          apply from: new File(["node", "--print", "require.resolve('expo/package.json')"].execute(null, rootDir).text.trim(), "../scripts/autolinking.gradle");
          apply from: new File(["node", "--print", "require.resolve('@expo/config/package.json')"].execute(null, rootDir).text.trim(), "../scripts/generate-unimodules-gradle.gradle");
          useExpoModules()
          EOF
          fi
          
          # 确保 build.gradle 包含 Expo 插件
          if [ -f "build.gradle" ]; then
            if ! grep -q "expo-module-gradle-plugin" build.gradle 2>/dev/null; then
              echo "Adding expo-module-gradle-plugin to build.gradle"
              sed -i '/dependencies {/a\        classpath("expo:expo-module-gradle-plugin:0.13.0")' build.gradle || true
            fi
          fi
          
          # 确保 app/build.gradle 包含 Expo 插件
          if [ -f "app/build.gradle" ]; then
            if ! grep -q "expo-module-gradle-plugin" app/build.gradle 2>/dev/null; then
              echo "Adding expo-module-gradle-plugin to app/build.gradle"
              sed -i '1i\apply plugin: "expo-module-gradle-plugin"' app/build.gradle || true
            fi
          fi
          
          echo "=== settings.gradle ==="
          cat settings.gradle
          echo ""
          echo "=== build.gradle ==="
          cat build.gradle
          echo ""
          echo "=== app/build.gradle (first 30 lines) ==="
          head -30 app/build.gradle
        
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
      - name: Find APK
        run: find android -name "*.apk" -type f
          
      - name: Copy APK
        run: |
          APK=$(find android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" ./lami-chat.apk
            ls -la ./lami-chat.apk
          else
            echo "No APK found!"
            exit 1
          fi
          
      - uses: actions/upload-artifact@v4
        with:
          name: lami-chat-apk
          path: ./lami-chat.apk
          retention-days: 90
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: ./lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
