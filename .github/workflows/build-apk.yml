name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm ci
        
      - name: Prebuild Android project
        run: npx expo prebuild --platform android
        
      - name: Fix Gradle compatibility
        run: |
          cd android
          
          # 降级 Gradle 到 8.2（AGP 7.4.2 最低要求）
          sed -i 's/gradle-.*-all.zip/gradle-8.2-all.zip/' gradle/wrapper/gradle-wrapper.properties
          
          # 降级 AGP 到 7.4.2
          sed -i -E "s/classpath\(['\"]com.android.tools.build:gradle:[0-9.]+['\"]\)/classpath('com.android.tools.build:gradle:7.4.2')/" build.gradle
          
          # 如果上面没有匹配到，尝试另一种方式
          if ! grep -q "gradle:7.4.2" build.gradle; then
            sed -i -E "s/com.android.tools.build:gradle/com.android.tools.build:gradle:7.4.2/" build.gradle
          fi
          
          echo "=== 修改后的配置 ==="
          echo "Gradle 版本:"
          cat gradle/wrapper/gradle-wrapper.properties
          echo ""
          echo "AGP 版本:"
          grep "com.android.tools.build:gradle" build.gradle
        
      - name: Build APK with Gradle
        id: build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
        continue-on-error: true
        
      - name: Check build result
        id: check
        run: |
          cd android
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "build_success=true" >> $GITHUB_OUTPUT
            echo "✅ APK 构建成功"
          else
            echo "build_success=false" >> $GITHUB_OUTPUT
            echo "❌ APK 构建失败"
          fi
        
      - name: Extract error from log
        if: steps.check.outputs.build_success != 'true'
        id: extract_error
        run: |
          cd android
          
          # 提取错误信息
          echo "=== 提取错误信息 ===" > error_summary.txt
          echo "" >> error_summary.txt
          
          # 查找 FAILURE 关键字
          echo "【FAILURE 部分】" >> error_summary.txt
          grep -A 20 "FAILURE" build.log >> error_summary.txt 2>/dev/null || echo "未找到 FAILURE" >> error_summary.txt
          echo "" >> error_summary.txt
          
          # 查找 What went wrong
          echo "【What went wrong】" >> error_summary.txt
          grep -A 10 "What went wrong" build.log >> error_summary.txt 2>/dev/null || echo "未找到 What went wrong" >> error_summary.txt
          echo "" >> error_summary.txt
          
          # 查找 error 关键字
          echo "【Error 部分】" >> error_summary.txt
          grep -i "error" build.log | head -30 >> error_summary.txt 2>/dev/null || echo "未找到 error" >> error_summary.txt
          echo "" >> error_summary.txt
          
          # 查找 exception
          echo "【Exception 部分】" >> error_summary.txt
          grep -i "exception" build.log | head -20 >> error_summary.txt 2>/dev/null || echo "未找到 exception" >> error_summary.txt
          echo "" >> error_summary.txt
          
          # 查找 Caused by
          echo "【Caused by】" >> error_summary.txt
          grep -A 5 "Caused by" build.log >> error_summary.txt 2>/dev/null || echo "未找到 Caused by" >> error_summary.txt
          
          # 保存到环境变量
          {
            echo 'error_summary<<EOF'
            cat error_summary.txt
            echo EOF
          } >> $GITHUB_ENV
          
          # 显示错误摘要
          echo "========== 错误摘要 =========="
          cat error_summary.txt
          echo "=============================="
          
      - name: Upload error log
        if: steps.check.outputs.build_success != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: |
            android/build.log
            android/error_summary.txt
          retention-days: 7
          
      - name: Create error issue
        if: steps.check.outputs.build_success != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const errorSummary = process.env.error_summary || '构建失败，请查看日志';
            
            // 创建 Issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 构建失败 - ${new Date().toISOString().split('T')[0]}`,
              body: `## 构建失败报告
            
            **时间**: ${new Date().toISOString()}
            **运行链接**: ${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            
            ## 错误摘要
            
            \`\`\`
            ${errorSummary}
            \`\`\`
            
            ## 下一步
            
            请查看 [构建日志](${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) 获取详细信息。
            `,
              labels: ['build-error', 'automated']
            });
            
      - name: Copy APK
        if: steps.check.outputs.build_success == 'true'
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk ./lami-chat.apk
          ls -la ./lami-chat.apk
          
      - uses: actions/upload-artifact@v4
        if: steps.check.outputs.build_success == 'true'
        with:
          name: lami-chat-apk
          path: ./lami-chat.apk
          retention-days: 90
          
      - name: Create Release
        if: steps.check.outputs.build_success == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: ./lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # 最终状态检查
      - name: Final status
        if: steps.check.outputs.build_success != 'true'
        run: |
          echo "❌ 构建失败！"
          echo "错误摘要已保存到 artifact 和 Issue"
          exit 1
