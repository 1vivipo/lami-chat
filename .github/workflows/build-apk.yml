name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - uses: android-actions/setup-android@v3
          
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: 7rlnN8DnBXZ57TftXkOibKDy8mQRZLvrmW13-8BF
          
      - run: npm install
      
      - name: Install expect for interactive prompts
        run: sudo apt-get install -y expect
      
      - name: Build APK with EAS
        run: |
          expect -c '
            set timeout 600
            log_user 1
            spawn eas build --platform android --profile preview --local
            expect {
              "Would you like to automatically create an EAS project" {
                send "y\r"
                exp_continue
              }
              "Generate a new Android Keystore" {
                send "y\r"
                exp_continue
              }
              timeout {
                puts "Build timed out"
                exit 1
              }
              eof
            }
          '
        env:
          EXPO_TOKEN: 7rlnN8DnBXZ57TftXkOibKDy8mQRZLvrmW13-8BF
      
      - name: Find and list APK files
        run: |
          echo "=== Current directory ==="
          pwd
          echo ""
          echo "=== All files in current directory ==="
          ls -la
          echo ""
          echo "=== Finding all APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo ""
          echo "=== Checking build directories ==="
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK directory"
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "No release APK directory"
          
      - name: Copy APK to root
        run: |
          APK_FILE=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "Found APK: $APK_FILE"
            cp "$APK_FILE" ./lami-chat.apk
            ls -la ./lami-chat.apk
          else
            echo "No APK found, checking if build directory exists..."
            if [ -d "android/app/build/outputs/apk/debug" ]; then
              cp android/app/build/outputs/apk/debug/*.apk ./lami-chat.apk 2>/dev/null || true
            fi
            if [ ! -f "./lami-chat.apk" ]; then
              echo "Still no APK found!"
              exit 1
            fi
          fi
          
      - uses: actions/upload-artifact@v4
        with:
          name: lami-chat-apk
          path: ./lami-chat.apk
          retention-days: 90
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: ./lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 下载
            下载下方的 APK 文件安装即可
            
            ### 安装说明
            1. 下载 APK 文件
            2. 在手机上打开并允许安装未知来源应用
            3. 按照提示完成安装
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
