name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: 7rlnN8DnBXZ57TftXkOibKDy8mQRZLvrmW13-8BF
          
      - run: npm install
      
      - name: Install expect for interactive prompts
        run: sudo apt-get install -y expect
      
      - name: Build APK with auto-confirm
        run: |
          expect -c '
            spawn eas build --platform android --profile preview --local --output ./app.apk
            expect {
              "Would you like to automatically create an EAS project" {
                send "y\r"
                exp_continue
              }
              "Generate a new Android Keystore" {
                send "y\r"
                exp_continue
              }
              eof
            }
          '
        env:
          EXPO_TOKEN: 7rlnN8DnBXZ57TftXkOibKDy8mQRZLvrmW13-8BF
      
      - name: List files
        run: ls -la
          
      - name: Find APK file
        run: |
          APK_FILE=$(find . -name "*.apk" -type f | head -1)
          echo "Found APK: $APK_FILE"
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" ./lami-chat.apk
          fi
          
      - name: Verify APK exists
        run: ls -la ./lami-chat.apk
          
      - uses: actions/upload-artifact@v4
        with:
          name: lami-chat-apk
          path: ./lami-chat.apk
          retention-days: 90
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: ./lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 下载
            下载下方的 APK 文件安装即可
            
            ### 安装说明
            1. 下载 APK 文件
            2. 在手机上打开并允许安装未知来源应用
            3. 按照提示完成安装
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
