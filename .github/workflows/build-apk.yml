name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Clean everything
        run: |
          rm -rf node_modules
          rm -rf android
          rm -rf ios
          rm -f package-lock.json
          
      - name: Install dependencies
        run: npm install
        
      - name: Fix Expo dependencies
        run: npx expo install --fix
        
      - name: Generate Android project
        run: npx expo prebuild --platform android --clean
        
      - name: Fix build.gradle - add apply plugin expo-module
        run: |
          cd android
          
          # 创建新的 build.gradle，按照豆包的建议
          cat > build.gradle.new << 'EOF'
          // Top-level build file where you can add configuration options common to all sub-projects/modules.

          buildscript {
              ext {
                  buildToolsVersion = findProperty('android.buildToolsVersion') ?: '34.0.0'
                  minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '23')
                  compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '34')
                  targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '34')
                  kotlinVersion = findProperty('android.kotlinVersion') ?: '1.9.0'
                  ndkVersion = "26.1.10909125"
              }
              repositories {
                  google()
                  mavenCentral()
                  maven { url "https://plugins.gradle.org/m2/" }
                  maven { url "https://jitpack.io" }
              }
              dependencies {
                  classpath('com.android.tools.build:gradle:8.1.0')
                  classpath('com.facebook.react:react-native-gradle-plugin')
                  classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0')
                  classpath("gradle.plugin.expo.modules:expo-module-gradle-plugin:0.13.0")
              }
          }

          // 应用 React Native 根项目插件
          apply plugin: "com.facebook.react.rootproject"
          // 应用 Expo 模块插件
          apply plugin: "expo-module"

          allprojects {
              repositories {
                  maven {
                      url(new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android'))
                  }
                  maven {
                      url(new File(['node', '--print', "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), '../dist'))
                  }
                  google()
                  mavenCentral()
                  maven { url "https://plugins.gradle.org/m2/" }
                  maven { url "https://jitpack.io" }
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          mv build.gradle.new build.gradle
          
          echo "=== New build.gradle ==="
          cat build.gradle
        
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
      - name: Find APK
        run: find android -name "*.apk" -type f
          
      - name: Copy APK
        run: |
          APK=$(find android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" ./lami-chat.apk
            ls -la ./lami-chat.apk
          else
            echo "No APK found!"
            exit 1
          fi
          
      - uses: actions/upload-artifact@v4
        with:
          name: lami-chat-apk
          path: ./lami-chat.apk
          retention-days: 90
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: ./lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
