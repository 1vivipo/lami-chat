name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Clean previous builds
        run: |
          rm -rf node_modules
          rm -rf android
          rm -rf ios
          rm -f package-lock.json
          
      - name: Install dependencies
        run: npm install
        
      - name: Fix Expo dependencies
        run: npx expo install --fix
        
      - name: Generate Android project
        run: npx expo prebuild --platform android --clean
        
      - name: Fix Gradle version to 8.2
        run: |
          cd android
          
          # 使用 Gradle 8.2 (Android Gradle Plugin 要求的最低版本)
          sed -i 's|gradle-[0-9.]*-all.zip|gradle-8.2-all.zip|g' gradle/wrapper/gradle-wrapper.properties
          
          # 移除 Java toolchain 配置
          if [ -f "app/build.gradle" ]; then
            sed -i '/jvmToolchain/d' app/build.gradle || true
            sed -i '/toolchain/d' app/build.gradle || true
          fi
          if [ -f "build.gradle" ]; then
            sed -i '/jvmToolchain/d' build.gradle || true
            sed -i '/toolchain/d' build.gradle || true
          fi
          
          echo "=== Gradle wrapper properties ==="
          cat gradle/wrapper/gradle-wrapper.properties
        
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
      - name: Find APK
        run: find android -name "*.apk" -type f
          
      - name: Copy APK
        run: |
          APK=$(find android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" ./lami-chat.apk
            ls -la ./lami-chat.apk
          else
            echo "No APK found!"
            exit 1
          fi
          
      - uses: actions/upload-artifact@v4
        with:
          name: lami-chat-apk
          path: ./lami-chat.apk
          retention-days: 90
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: ./lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
