name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm install
        
      - name: Remove EAS config
        run: rm -f eas.json
          
      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_DOTENV: 1
          EXPO_NO_INTERACTIVE: 1
          
      - name: Build APK and verify
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          
          echo ""
          echo "=== Build completed, checking outputs ==="
          ls -la app/build/outputs/apk/debug/ || echo "Debug APK dir not found"
          ls -la app/build/outputs/apk/release/ || echo "Release APK dir not found"
          
          echo ""
          echo "=== Finding all APK files ==="
          find . -name "*.apk" -type f
          
          echo ""
          echo "=== Copying APK ==="
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp app/build/outputs/apk/debug/app-debug.apk ../lami-chat.apk
            echo "APK copied to ../lami-chat.apk"
          elif [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            cp app/build/outputs/apk/release/app-release.apk ../lami-chat.apk
            echo "APK copied to ../lami-chat.apk"
          else
            echo "No APK found in standard locations"
            # Try to find any APK
            APK=$(find . -name "*.apk" -type f | head -1)
            if [ -n "$APK" ]; then
              echo "Found APK at: $APK"
              cp "$APK" ../lami-chat.apk
            else
              echo "ERROR: No APK file found anywhere!"
              exit 1
            fi
          fi
          
          cd ..
          ls -la lami-chat.apk
          
      - uses: actions/upload-artifact@v4
        with:
          name: lami-chat-apk
          path: ./lami-chat.apk
          retention-days: 90
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: ./lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
