name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm install
        
      - name: Remove EAS config
        run: rm -f eas.json
          
      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_DOTENV: 1
          EXPO_NO_INTERACTIVE: 1
          
      - name: List generated files
        run: ls -la android/
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          
      - name: Find APK
        run: |
          echo "=== Finding APK files ==="
          find /home -name "*.apk" -type f 2>/dev/null || true
          find /github -name "*.apk" -type f 2>/dev/null || true
          find . -name "*.apk" -type f 2>/dev/null || true
          
      - name: Copy APK
        run: |
          # Try multiple possible locations
          for path in \
            "android/app/build/outputs/apk/debug/app-debug.apk" \
            "./android/app/build/outputs/apk/debug/app-debug.apk" \
            "app/build/outputs/apk/debug/app-debug.apk"
          do
            if [ -f "$path" ]; then
              echo "Found APK at: $path"
              cp "$path" ./lami-chat.apk
              ls -la ./lami-chat.apk
              exit 0
            fi
          done
          
          echo "APK not found in standard locations, searching..."
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "Found APK at: $APK"
            cp "$APK" ./lami-chat.apk
            ls -la ./lami-chat.apk
            exit 0
          fi
          
          echo "ERROR: No APK found!"
          exit 1
          
      - uses: actions/upload-artifact@v4
        with:
          name: lami-chat-apk
          path: ./lami-chat.apk
          retention-days: 90
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: ./lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
