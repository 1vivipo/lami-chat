name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: 7rlnN8DnBXZ57TftXkOibKDy8mQRZLvrmW13-8BF
          
      - run: npm install
      
      - name: Create eas.json
        run: |
          cat > eas.json << 'EOF'
          {
            "cli": {
              "version": ">= 10.0.0",
              "appVersionSource": "remote"
            },
            "build": {
              "preview": {
                "distribution": "internal",
                "android": {
                  "buildType": "apk"
                },
                "withoutCredentials": true
              }
            }
          }
          EOF
      
      - name: Build on Expo Cloud
        run: |
          echo "y" | eas build --platform android --profile preview --wait 2>&1 || true
          eas build:list --platform android --limit 1 --json > build_info.json
          cat build_info.json
        env:
          EXPO_TOKEN: 7rlnN8DnBXZ57TftXkOibKDy8mQRZLvrmW13-8BF
          
      - name: Download APK
        run: |
          BUILD_URL=$(cat build_info.json | jq -r '.[0].artifacts.buildUrl // empty')
          if [ -n "$BUILD_URL" ]; then
            echo "Downloading APK from: $BUILD_URL"
            curl -L -o lami-chat.apk "$BUILD_URL"
            ls -la lami-chat.apk
          else
            echo "No build URL found"
            exit 1
          fi
        env:
          EXPO_TOKEN: 7rlnN8DnBXZ57TftXkOibKDy8mQRZLvrmW13-8BF
          
      - uses: actions/upload-artifact@v4
        with:
          name: lami-chat-apk
          path: ./lami-chat.apk
          retention-days: 90
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Lami Chat v1.0.${{ github.run_number }}
          files: ./lami-chat.apk
          body: |
            ## Lami Chat Release
            
            ### 下载
            下载下方的 APK 文件安装即可
            
            ### 安装说明
            1. 下载 APK 文件
            2. 在手机上打开并允许安装未知来源应用
            3. 按照提示完成安装
            
            ### 测试账号
            | 账号 | 密码 |
            |------|------|
            | TEST01 | Test123456 |
            | TEST02 | Test123456 |
            | TEST03 | Test123456 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
